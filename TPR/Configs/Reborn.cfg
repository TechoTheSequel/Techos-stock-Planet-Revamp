// Order of patches is as follows: Reborn > Rescale > ParallaxScaled > Rescaled ParallaxScaled > Scatterer > Reborn Scatterer > Rescaled Scatterer

// Changes orbits and physical properties

@Kopernicus:HAS[@TPRSettings:HAS[#Mode[Reborn]]]:AFTER[Q_TPR]
{

    @Body:HAS[#identifier[Squad/Sun]]
	{
    }

    @Body:HAS[#identifier[Squad/Moho]]
	{
        @Orbit
		{
            @color = #885644
        }
    }
	
	@Body:HAS[#identifier[Squad/Eve]]
	{
        @Orbit
		{
            @color = #D383CF
        }
    }
	
    @Body:HAS[#identifier[Squad/Gilly]]
	{
        @Orbit
		{
            @color = #7F6546
        }
    }

    @Body:HAS[#identifier[Squad/Kerbin]]
	{
        @Orbit
		{
			@eccentricity = 0.012987
			@inclination = 0.6103
            @color = #3C82AA
        }
    }

    @Body:HAS[#identifier[Squad/Mun]]
	{
		@Properties
		{
			%initialRotation = 205
		}
        @Orbit
		{
			@semiMajorAxis = 35031068	// 46695172 originally
			@eccentricity = 0.04908
			@inclination = 3.192
			%longitudeOfAscendingNode = 0
			%argumentOfPeriapsis = -30
			%meanAnomalyAtEpochD = 97.4
            @color = #D8D2D2
        }
    }

    @Body:HAS[#identifier[Squad/Minmus]]
	{
		@Properties
		{
			@rotationPeriod = 45971					// real scale rotation period
			@rotationPeriod *= 0.31622776601		// converts to kerbal scale
		}
        @Orbit
		{
			@referenceBody = Sun
			@semiMajorAxis = 13599840256
			%eccentricity = 0.009287
			%inclination = 0.7103
			%longitudeOfAscendingNode = 13
			%argumentOfPeriapsis = 348
			%meanAnomalyAtEpochD = 179.026578467357
            @color = #66B7C1
        }
    }

    @Body:HAS[#identifier[Squad/Duna]]
	{
        @Orbit
		{
            @color = #96432E
        }
    }

    @Body:HAS[#identifier[Squad/Ike]]
	{
        @Orbit
		{
            @color = #706767
        }
    }

    @Body:HAS[#identifier[TPR/MagicBoulder]]
	{
    }

    @Body:HAS[#identifier[Squad/Dres]]
	{
        @Orbit
		{
            @color = #7D7773
        }
    }

    @Body:HAS[#identifier[Squad/Jool]]
	{
        @Properties
		{
            %radius = 71367350
			@radius *= 0.1
			@geeASL = 2.84
			@rotationPeriod = 36000
        }
        @Orbit
		{
            @color = #A0B70B
        }
    }

    @Body:HAS[#identifier[Squad/JoolCore]]
	{
        @Properties
		{
            %radius = 71367350
			@radius *= 0.1
        }
    }

    @Body:HAS[#identifier[Squad/Laythe]]
	{
        @Properties
		{
			%radius = 4410650
            @radius *= 0.1
			%geeASL = 0.52
        }
        @Orbit
		{
            @color = #2F4671
			%semiMajorAxis = 27184000 
        }
    }

    @Body:HAS[#identifier[Squad/Vall]]
	{
        @Properties
		{
			%radius = 2631200
            @radius *= 0.1
			%geeASL = 0.15
        }
        @Orbit
		{
            @color = #AFBDC8
			%semiMajorAxis = 43152000
        }
    }

    @Body:HAS[#identifier[Squad/Tylo]]
	{
        @Properties
		{
			%radius = 5332480
            @radius *= 0.1
			%geeASL = 0.65
        }
        @Orbit
		{
            @color = #998461 
			%semiMajorAxis = 68500000
			%inclination = 0.025000000372529
		}
    }

    @Body:HAS[#identifier[Squad/Bop]]
	{
        @Orbit
		{
            @color = #876A64
        }
    }

    @Body:HAS[#identifier[Squad/Pol]]
	{
        @Orbit
		{
            @color = #A59561
        }
    }

    @Body:HAS[#identifier[Squad/Eeloo]]
	{
        @Orbit
		{
            @color = #C4BEB4
        }
    }
}

// Extends Kerbin's scatterer load distance so it is visible from Minmus' new orbit, adds Minmus to planetlist

@Scatterer_planetsList:FOR[Z_StockScattererConfigs]:HAS[@TPRSettings:HAS[#Mode[Reborn]]]
{
	@scattererCelestialBodies
	{
		@Item:HAS[#celestialBodyName[Kerbin]]
		{
			@loadDistance *= 10
			@unloadDistance *= 10
		}
		Item
		{
			celestialBodyName = Minmus
			transformName = Minmus
			loadDistance = 10000000000
			unloadDistance = 20000000000
			hasOcean = False
			flatScaledSpaceModel = True
			usesCloudIntegration = True
			cloudIntegrationUsesScattererSunColors = False
			mainSunCelestialBody = Sun
			sunColor = 1.0,1.0,1.0
			sunsUseIntensityCurves = False
		}
	}
}

// Adds Minmus' coma

@Scatterer_atmosphere:NEEDS[Scatterer]:FOR[Z_StockScattererConfigs]:HAS[@TPRSettings:HAS[#Mode[Reborn]]]
{
	Atmo
	{
		name = Minmus
		atmosphereStartRadiusScale = 1
		HR = 10000
		HM = 10000
		m_betaR = 1.12E-06, 1.52E-06, 2.3E-06
		BETA_MSca = 1.024E-07, 1.024E-07, 1.524E-07
		m_mieG = 0.550000012
		averageGroundReflectance = 0.100000001
		multipleScattering = True
		godrayStrength = 0.800000012
		flattenScaledSpaceMesh = 0
		rimBlend = 20
		rimpower = 600
		cloudColorMultiplier = 3
		cloudScatteringMultiplier = 0.200000003
		cloudSkyIrradianceMultiplier = 0.100000001
		volumetricsColorMultiplier = 1
		EVEIntegration_preserveCloudColors = False
		adjustScaledTexture = False
		scaledLandBrightnessAdjust = 1
		scaledLandContrastAdjust = 1
		scaledLandSaturationAdjust = 1
		scaledOceanBrightnessAdjust = 1
		scaledOceanContrastAdjust = 1
		scaledOceanSaturationAdjust = 1
		specR = 0
		specG = 0
		specB = 0
		shininess = 0
		configPoints
		{
			Item
			{
				altitude = 100000
				skyExposure = 0.2
				skyAlpha = 1
				skyExtinctionTint = 1
				scatteringExposure = 0.119999997
				extinctionThickness = 1
				postProcessAlpha = 1
				postProcessDepth = 0
				extinctionTint = 1
			}
		}
	}
}