// Every rescale config has the following structure:
// - Rescale of the planets themselves, including their radius, rotation period and semi-major axis. For irregular bodies this will also rescale their PQS mods.
// - ParallaxScaled rescale for the minimum and maximum altitudes.
// - Scatterer rescale for the load and unload distances.

@Kopernicus:NEEDS[OPM]:AFTER[Q2_TPR]
{
	@Body:HAS[#identifier[Squad/Eeloo]]
	{
		@Orbit
		{
			%referenceBody = Sarnus
			%semiMajorAxis = 19105978
			%inclination = 2.3
			%eccentricity = 0.0034
			%longitudeOfAscendingNode = 55
		}
	}
}

