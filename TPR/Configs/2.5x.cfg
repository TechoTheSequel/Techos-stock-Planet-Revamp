// Parallax

@ParallaxTerrain:FOR[Q5_TPR]:NEEDS[ParallaxStock]:HAS[@TPRSettings:HAS[#Scale[Quarter]]]
{
	@Body[Gilly]
	{
		@ParallaxScaledProperties
        {
            @minTerrainAltitude *= 2.5
            @maxTerrainAltitude *= 2.5
		}
	}
	@Body[Bop]
	{
		@ParallaxScaledProperties
        {
            @minTerrainAltitude *= 2.5
            @maxTerrainAltitude *= 2.5
		}
	}
	@Body[Pol]
	{
		@ParallaxScaledProperties
        {
            @minTerrainAltitude *= 2.5
            @maxTerrainAltitude *= 2.5
		}
	}
}

// Scatterer

@Scatterer_planetsList:HAS[@TPRSettings:HAS[#Scale[Quarter]]]:AFTER[StockScattererConfigs]
{		
	@scattererCelestialBodies
	{
		@Item:HAS[#celestialBodyName[Eve]]
		{
			@loadDistance *= 2.5
			@unloadDistance *= 2.5
		}
		@Item:HAS[#celestialBodyName[Kerbin]]
		{
			@loadDistance *= 2.5
			@unloadDistance *= 2.5
		}
		@Item:HAS[#celestialBodyName[Duna]]
		{
			@loadDistance *= 2.5
			@unloadDistance *= 2.5
		}
		@Item:HAS[#celestialBodyName[Jool]]
		{
			@loadDistance *= 2.5
			@unloadDistance *= 2.5
		}
		@Item:HAS[#celestialBodyName[Laythe]]
		{
			@loadDistance *= 2.5
			@unloadDistance *= 2.5
		}
	}
}

// If Reborn mode is enabled, rescales Minmus' coma

@Scatterer_planetsList:FOR[Z2_StockScattererConfigs]:HAS[@TPRSettings:HAS[#Scale[Quarter]]]:HAS[@TPRSettings:HAS[#Mode[Reborn]]]
{		
	@scattererCelestialBodies
	{
		@Item:HAS[#celestialBodyName[Minmus]]
		{
			@loadDistance *= 2.5
			@unloadDistance *= 2.5
		}
	}
}

@Scatterer_atmosphere:NEEDS[Scatterer]:FOR[Z2_StockScattererConfigs]:HAS[@TPRSettings:HAS[#Scale[Quarter]]]:HAS[@TPRSettings:HAS[#Mode[Reborn]]]
{
	@Atmo:HAS[#name[Minmus]]
	{
		@HR *= 2.5
		@HM *= 2.5
	}
}