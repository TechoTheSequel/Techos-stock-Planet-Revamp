        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }

    @Body:HAS[#identifier[Squad/Bop]]
	{
	    @Properties
		{
            @radius *= 2.5
            @rotationPeriod *= 1.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
		@PQS
		{
			@Mods
			{
				@VertexMitchellNetravaliHeightMap[_Height1]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
				@VertexMitchellNetravaliHeightMap[_Height2]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
				@VertexMitchellNetravaliHeightMap[_Height3]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
				@VertexMitchellNetravaliHeightMap[_Height4]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
				@VertexMitchellNetravaliHeightMap[_Height5]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
				@VertexHeightOblate
				{
					@height *= 2.5
				}
			}
		}
    }

    @Body:HAS[#identifier[Squad/Pol]]
	{
	    @Properties
		{
            @radius *= 2.5
            @rotationPeriod *= 1.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
		@PQS
		{
			@Mods
			{
				@VertexMitchellNetravaliHeightMap[_Height1]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
