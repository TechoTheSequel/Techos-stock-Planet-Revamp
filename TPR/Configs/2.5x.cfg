// Every rescale config has the following structure:
// - Rescale of the planets themselves, including their radius, rotation period and semi-major axis. For irregular bodies (Gilly, Bop and Pol) this will also rescale their PQS mods.
// - ParallaxScaled rescale for the minimum and maximum altitudes.
// - Scatterer rescale for the load and unload distances.

@Kopernicus:HAS[@TPRSettings:HAS[#Scale[Quarter]]]:AFTER[Q3_TPR]
{

    @Body:HAS[#identifier[Squad/Kerbin]]
	{
        @Properties
		{
            @radius *= 2.5
            @rotationPeriod *= 1.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
        @PQS
        {
            @Mods
            {
                @MapDecalTangent[KSC]
                {
                    @radius = 18500
                }
            }
        }
    }

    @Body:HAS[#identifier[Squad/Mun]]
	{
        @Properties
		{
            @radius *= 2.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }

    @Body:HAS[#identifier[Squad/Minmus]]
	{
        @Properties
		{
            @radius *= 2.5
            @rotationPeriod *= 1.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }

    @Body:HAS[#identifier[Squad/Sun]]
	{
        @Properties
		{
            @radius *= 2.5
        }
		@ScaledVersion
		{
			@Light
			{
				@sunAU *= 2.5
			}
		}
    }

    @Body:HAS[#identifier[Squad/Moho]]
	{
        @Properties
		{
            @radius *= 2.5
            @rotationPeriod *= 1.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }
    
    @Body:HAS[#identifier[Squad/Eve]]
	{
        @Properties
		{
            @radius *= 2.5
            @rotationPeriod *= 1.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }

    @Body:HAS[#identifier[Squad/Gilly]]
	{
	    @Properties
		{
            @radius *= 2.5
            @rotationPeriod *= 1.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
		@PQS
		{
			@Mods
			{
				@VertexMitchellNetravaliHeightMap[_Height1]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
				@VertexMitchellNetravaliHeightMap[_Height2]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
				@VertexMitchellNetravaliHeightMap[_Height3]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
				@VertexMitchellNetravaliHeightMap[_Height4]
				{
					@offset *= 2.5
					@deformity *= 2.5
				}
				@VertexHeightOblate[_Height5]
				{
					@height *= 2.5
				}
				@VertexHeightNoise[_Height]
				{
					@deformity *= 2.5
				}
			}
		}
    }

    @Body:HAS[#identifier[Squad/Duna]]
	{
        @Properties
		{
            @radius *= 2.5
            @rotationPeriod = 100558.887219309
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }

    @Body:HAS[#identifier[Squad/Ike]]
	{
        @Properties
		{
            @radius *= 2.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }

    @Body:HAS[#identifier[TPR/MagicBoulder]]
	{
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }

    @Body:HAS[#identifier[Squad/Dres]]
	{
        @Properties
		{
            @radius *= 2.5
			@rotationPeriod *= 1.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }

    @Body:HAS[#identifier[Squad/Jool]]
	{
        @Properties
		{
            @radius *= 2.5
            @rotationPeriod *= 1.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }
	//@Body:HAS[#identifier[Squad/JoolCore]]
	//{
    //    @Properties
	//	{
    //        @radius *= 2.5
	//	}
    //}

    @Body:HAS[#identifier[Squad/Laythe]]
	{
        @Properties
		{
            @radius *= 2.5
        }
        @Orbit
		{
            @semiMajorAxis *= 2.5
        }
    }

    @Body:HAS[#identifier[Squad/Vall]]
	{
        @Properties
		{
            @radius *= 2.5
        }
