@Scatterer_planetsList:AFTER[StockScattererConfigs]
{		
	@scattererCelestialBodies
	{
		@Item:HAS[#celestialBodyName[Kerbin]]
		{
			@loadDistance *= 4
			@unloadDistance *= 4
		}
		@Item:HAS[#celestialBodyName[Duna]]
		{
			@loadDistance *= 4
			@unloadDistance *= 4
		}
		@Item:HAS[#celestialBodyName[Jool]]
		{
			@loadDistance *= 4
			@unloadDistance *= 4
		}
		@Item:HAS[#celestialBodyName[Laythe]]
		{
			@loadDistance *= 4
			@unloadDistance *= 4
		}
		@Item:HAS[#celestialBodyName[Eve]]
		{
			@loadDistance *= 4
			@unloadDistance *= 4
		}
	}
}
// just so the planets are visible from further away we will quadruple the load distances