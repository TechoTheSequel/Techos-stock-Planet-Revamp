@Scatterer_planetsList:AFTER[StockScattererConfigs]
{		
	@scattererCelestialBodies
	{
		@Item:HAS[#celestialBodyName[Kerbin]]
		{
			celestialBodyName = Kerbin
			transformName = Kerbin
			loadDistance = 100000000
			unloadDistance = 200000000
			hasOcean = True
			flatScaledSpaceModel = True
			usesCloudIntegration = True
			cloudIntegrationUsesScattererSunColors = False
			mainSunCelestialBody = Sun
			sunColor = 1.0,1.0,1.0
			sunsUseIntensityCurves = False
			eclipseCasters
			{
				Item = Mun
				Item = Minmus
			}
		}
		@Item:HAS[#celestialBodyName[Duna]]
		{
			celestialBodyName = Duna
			transformName = Duna
			loadDistance = 100000000
			unloadDistance = 200000000
			hasOcean = False
			flatScaledSpaceModel = False
			usesCloudIntegration = True
			cloudIntegrationUsesScattererSunColors = False
			mainSunCelestialBody = Sun
			sunsUseIntensityCurves = False
			eclipseCasters
			{
				Item = Ike
			}
		}
		@Item:HAS[#celestialBodyName[Jool]]
		{
			celestialBodyName = Jool
			transformName = Jool
			@loadDistance = 1E+09
			@unloadDistance = 1E+10
			hasOcean = False
			flatScaledSpaceModel = True
			usesCloudIntegration = True
			cloudIntegrationUsesScattererSunColors = False
			mainSunCelestialBody = Sun
			sunsUseIntensityCurves = False
			eclipseCasters
			{
				Item = Laythe
				Item = Vall
				Item = Tylo
				Item = Bop
				Item = Pol
			}
		}
		@Item:HAS[#celestialBodyName[Laythe]]
		{
			celestialBodyName = Laythe
			transformName = Laythe
			loadDistance = 300000000
			unloadDistance = 500000000
			hasOcean = True
			flatScaledSpaceModel = True
			usesCloudIntegration = True
			cloudIntegrationUsesScattererSunColors = False
			mainSunCelestialBody = Sun
			sunsUseIntensityCurves = False
			eclipseCasters
			{
				Item = Jool
				Item = Vall
				Item = Tylo
				Item = Bop
				Item = Pol
			}
		}
		@Item:HAS[#celestialBodyName[Eve]]
		{
			celestialBodyName = Eve
			transformName = Eve
			loadDistance = 300000000
			unloadDistance = 500000000
			hasOcean = True
			flatScaledSpaceModel = True
			usesCloudIntegration = True
			cloudIntegrationUsesScattererSunColors = False
			mainSunCelestialBody = Sun
			sunsUseIntensityCurves = False
			eclipseCasters
			{
				Item = Gilly
			}
		}
	}
}
