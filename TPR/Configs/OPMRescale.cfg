@Kopernicus:NEEDS[OPM]:AFTER[Q2_TPR]
{
	@Body:HAS[#identifier[Squad/Eeloo]]
	{
		@Orbit
		{
			%referenceBody = Sarnus
			%semiMajorAxis = 19105978
			%inclination = 2.3
			%eccentricity = 0.0034
			%longitudeOfAscendingNode = 55
		}
	}
}

