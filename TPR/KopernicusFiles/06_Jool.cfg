@Kopernicus:FOR[Q_TPR]
{
	Body
	{
		name = Jool
		cacheFile = TPR/Cache/JoolT.bin
		identifier = Squad/Jool
		Template
		{
			name = Jool
		}
		Properties
		{
			description = Every blessing in Kerbalkind's history was attributed to Jool, as many saw the green star in the night sky as a distant yet immanent god watching over them. For scientists this planet is not a smidge less alluring. \n\nThe first gas giant of the Kerbol system houses many anomalies, but two stand out: The brilliant green shade and its three planet-sized moons in orbit. It's no surprise that Jool is a hotspot for missions, and it also acts as a gravitational gateway to the outer system.
			radius = 60000000
			@radius *= 0.1
			geeASL = 0.8
			rotates = True
			rotationPeriod = 36000
			tidallyLocked = False
			initialRotation = 0
			timewarpAltitudeLimits =  0 0 0 0 0 0 0 0 
			displayName = Jool^N
		}
		Orbit
		{
			referenceBody = Sun
			inclination = 1.3
			eccentricity = 0.05
			semiMajorAxis = 687735603200
			@semiMajorAxis *= 0.1
			longitudeOfAscendingNode = 52
			argumentOfPeriapsis = 0
			meanAnomalyAtEpochD = 5.7
			epoch = 0
			color = 0.33,0.52,0.075,1.0
		}
		ScaledVersion
		{
 			Material
  			{
				color = 1, 1, 1, 1
				specColor = 0, 0, 0, 0
				shininess = 0.215
				//texture = TPR/PluginData/Jool_Clouds.png
				//normals = 
			}
		}
		//PQS
		//{
		//}
	}
}

